name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-apple-darwin
            os: macos-15-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable (v1)
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      # The git tag (vX.Y.Z) must match the Cargo.toml package version.
      - name: Check tag matches Cargo.toml version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 \
            | grep -o '"name":"ponchi","version":"[^"]*"' \
            | sed 's/.*"version":"\([^"]*\)"/\1/')"
          if [ "$version" != "$cargo_version" ]; then
            echo "tag $GITHUB_REF_NAME (=$version) != Cargo.toml version $cargo_version"
            exit 1
          fi

      - name: Build
        run: cargo build --locked --release --target "${{ matrix.target }}"

      # The Yomogi font is embedded in the binary, so the executable is fully
      # self-contained — ship it as a single file per target.
      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ponchi" "dist/ponchi-${{ matrix.target }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ponchi-${{ matrix.target }}
          path: dist/ponchi-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Collect assets and checksums
        shell: bash
        run: |
          mkdir -p release
          cp artifacts/ponchi-* release/
          # Ship the OFL notice for the embedded Yomogi font.
          cp assets/fonts/Yomogi-OFL.txt release/Yomogi-OFL.txt
          ( cd release && sha256sum ponchi-* > SHA256SUMS )
          ls -l release

      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
